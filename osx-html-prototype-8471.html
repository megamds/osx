<!DOCTYPE html><html><head><meta charset="UTF-8"><title>OSX Prototype</title><style>html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(135deg,#4b79a1,#283e51);font-family:Inter,sans-serif}#dock{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;gap:12px;padding:14px;border-radius:24px;background:rgba(255,255,255,.2);backdrop-filter:blur(20px)}.icon{width:56px;height:56px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;transition:transform .12s}#dock:hover .icon:hover{transform:translateY(-12px) scale(1.5)}</style></head><body><div id="dock"><div class="icon">📁</div><div class="icon">🌐</div><div class="icon">✨</div><div class="icon">⚙️</div></div></body></html>
